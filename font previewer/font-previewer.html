  /* ============================================================
     PAGE STYLES
     ============================================================ */

  body {
    font-family: system-ui, sans-serif;
    max-width: 800px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: #f5f0e6;
    color: #2b2216;
  }

  h1 {
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: #fff;
    border: 1px solid #d8cbb0;
    border-radius: 6px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    font-size: 0.85rem;
  }

  input[type="range"] {
    font-size: 1rem;
  }

  h4 {
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
    font-size: 0.95rem;
    padding: 0.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid #d8cbb0;
    border-radius: 6px;
    resize: vertical;
  }

  #sizeValue {
    font-weight: bold;
  }

  .preview-block {
    background: #fff;
    border: 1px solid #d8cbb0;
    border-radius: 6px;
    padding: 0.5rem;
    margin-bottom: 1rem;
  }

  .preview-block .font-label {
    font-size: 0.8rem;
    color: #6b5f4a;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .preview-block .preview-text {
    word-wrap: break-word;
    line-height: 1.4;
    white-space: pre-wrap;
  }

  #emptyMessage {
    color: #6b5f4a;
    font-style: italic;
  }

</style>

<body>

<h1>Font Previewer</h1>

<div class="controls">
  <div class="control-group">
    <label for="fontSize">Size: <span id="sizeValue">24</span>px</label>
    <input type="range" id="fontSize" min="10" max="150" value="24">
  </div>

  <div class="control-group">
    <label for="fontColorPicker">Color</label>
    <div style="display:flex; gap:0.5rem; align-items:center;">
      <input type="color" id="fontColorPicker" value="#2b2216">
      <input type="text" id="fontColorHex" value="#2b2216" maxlength="7" style="width:5.5em; font-family:monospace;">
    </div>
  </div>
</div>

<h4>Edit Me</h4>
<textarea id="previewText" rows="4">Bloomfield Renaissance Faire
The five boxing wizards jump quickly.
abcdefghijklmnopqrstuvwxyz 0123456789
ABCDEFGHIJKLMNOPQRSTUVWXYZ</textarea>

<div id="previewContainer"></div>

<script>
  const fontSize = document.getElementById('fontSize');
  const sizeValue = document.getElementById('sizeValue');
  const previewText = document.getElementById('previewText');
  const previewContainer = document.getElementById('previewContainer');
  const fontColorPicker = document.getElementById('fontColorPicker');
  const fontColorHex = document.getElementById('fontColorHex');

  const hexPattern = /^#([0-9A-Fa-f]{6})$/;

  // Keep the color swatch and the hex text box in sync with each other
  fontColorPicker.addEventListener('input', () => {
    fontColorHex.value = fontColorPicker.value;
    updatePreviews();
  });

  fontColorHex.addEventListener('input', () => {
    let value = fontColorHex.value.trim();
    if (value && !value.startsWith('#')) value = '#' + value;
    if (hexPattern.test(value)) {
      fontColorPicker.value = value;
      updatePreviews();
    }
  });

  // Scan all stylesheets for @font-face rules and pull out the
  // font-family names. This is what lets new fonts show up here
  // automatically just by adding an @font-face block above --
  // no other code changes needed.
  function detectFontFamilies() {
    const families = [];
    for (const sheet of document.styleSheets) {
      let rules;
      try {
        rules = sheet.cssRules || sheet.rules;
      } catch (e) {
        continue; // skip inaccessible stylesheets (e.g. cross-origin)
      }
      for (const rule of rules) {
        if (rule instanceof CSSFontFaceRule) {
          const family = rule.style.getPropertyValue('font-family').replace(/["']/g, '').trim();
          if (family && !families.includes(family)) {
            families.push(family);
          }
        }
      }
    }
    return families;
  }

  function buildPreviews() {
    const families = detectFontFamilies();
    previewContainer.innerHTML = '';

    if (families.length === 0) {
      previewContainer.innerHTML = '<p id="emptyMessage">No @font-face rules found. Add one in the &lt;style&gt; block above to see a preview here.</p>';
      return;
    }

    for (const family of families) {
      const block = document.createElement('div');
      block.className = 'preview-block';

      const label = document.createElement('div');
      label.className = 'font-label';
      label.textContent = family;

      const text = document.createElement('div');
      text.className = 'preview-text';
      text.style.fontFamily = `"${family}"`;
      text.style.fontSize = fontSize.value + 'px';
      text.style.color = fontColorPicker.value;
      text.textContent = previewText.value;

      block.appendChild(label);
      block.appendChild(text);
      previewContainer.appendChild(block);
    }
  }

  function updatePreviews() {
    sizeValue.textContent = fontSize.value;
    const texts = previewContainer.querySelectorAll('.preview-text');
    texts.forEach(el => {
      el.style.fontSize = fontSize.value + 'px';
      el.style.color = fontColorPicker.value;
      el.textContent = previewText.value;
    });
  }

  fontSize.addEventListener('input', updatePreviews);
  previewText.addEventListener('input', updatePreviews);

  buildPreviews();
</script>

</body>
